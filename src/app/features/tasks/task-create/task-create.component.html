<h2 class="page-title">Создание новой задачи</h2>

<div class="card">
  <div class="card-body">
    <form (ngSubmit)="createTask()">

      <div class="mb-3">
        <label class="form-label">Название задачи *</label>
        <input type="text" class="form-control" [(ngModel)]="task.title" name="title" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Описание</label>
        <textarea class="form-control" rows="4" [(ngModel)]="task.description" name="description"></textarea>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Приоритет</label>
          <select class="form-select" [(ngModel)]="task.priority" name="priority">
            <option value="HIGH">🔴 Высокий</option>
            <option value="MEDIUM" selected>🟡 Средний</option>
            <option value="LOW">🟢 Низкий</option>
          </select>
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Срок выполнения</label>
          <input type="date" class="form-control" [(ngModel)]="task.dueDate" name="dueDate">
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Исполнитель *</label>
          <select class="form-select" [(ngModel)]="task.assigneeId" name="assigneeId" required>
            <option value="0" disabled selected>Выберите исполнителя</option>
            <option *ngFor="let user of users" [value]="user.id">
              {{ user.fullName }} ({{ user.position || '—' }})
            </option>
          </select>
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Связанный документ</label>
          <select class="form-select" [(ngModel)]="task.documentId" name="documentId">
            <option value="null">Не привязывать документ</option>
            <option *ngFor="let doc of documents" [value]="doc.id">
              {{ doc.title }} (№ {{ doc.registrationNumber }})
            </option>
          </select>
        </div>
      </div>

      <div class="mt-4">
        <button type="submit" class="btn btn-success btn-lg px-5">
          Создать задачу
        </button>
        <button type="button" class="btn btn-secondary btn-lg px-5 ms-3" (click)="cancel()">
          Отмена
        </button>
      </div>
    </form>
  </div>
</div>
