<h2 class="page-title">
  ✅ Задачи 
  <small class="text-muted fs-6" *ngIf="isAdmin">(Режим администратора — все задачи)</small>
  <small class="text-muted fs-6" *ngIf="!isAdmin">(Только назначенные вам задачи)</small>
</h2>



<div class="d-flex justify-content-between align-items-center mb-4">
  <div class="btn-group">
    <button class="btn" [class.btn-primary]="filter === 'all'" (click)="changeFilter('all')">Все</button>
    <button class="btn" [class.btn-primary]="filter === 'today'" (click)="changeFilter('today')">На сегодня</button>
    <button class="btn" [class.btn-primary]="filter === 'overdue'" (click)="changeFilter('overdue')">Просроченные</button>
  </div>

  <!-- Кнопка создания задачи видна только админу -->
  <a *ngIf="isAdmin" 
     routerLink="/tasks/new" 
     class="btn btn-success d-flex align-items-center gap-2">
    <i class="bi bi-plus-lg"></i>
    Новая задача
  </a>
</div>

<div class="card">
  <div class="card-body p-0">
    <table class="table table-hover mb-0">
      <thead class="table-light">
        <tr>
          <th>Название</th>
          <th>Исполнитель</th>
          <th>Срок</th>
          <th>Приоритет</th>
          <th>Статус</th>
          <th class="text-end">Действия</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let task of tasks">
          <td>{{ task.title }}</td>
          <td>{{ task.assigneeName }}</td>
          <td [class.text-danger]="task.dueDate && task.dueDate < today">
            {{ task.dueDate | date:'dd.MM.yyyy' }}
          </td>
          <td>
            <span [class]="getPriorityClass(task.priority)">{{ task.priority }}</span>
          </td>
          <td>
            <span class="badge {{ getStatusClass(task.status) }}">{{ task.status }}</span>
          </td>
          <td class="text-end">
            <select class="form-select form-select-sm d-inline w-auto" 
              (change)="updateStatus(task.id, $any($event.target).value)">
              <option value="NEW" [selected]="task.status === 'NEW'">Новая</option>
              <option value="IN_PROGRESS" [selected]="task.status === 'IN_PROGRESS'">В работе</option>
              <option value="COMPLETED" [selected]="task.status === 'COMPLETED'">Выполнена</option>
            </select>
            <button class="btn btn-sm btn-outline-danger ms-2" (click)="deleteTask(task.id)">Удалить</button>
          </td>
        </tr>

        <tr *ngIf="tasks.length === 0">
          <td colspan="6" class="text-center py-4 text-muted">Задачи не найдены</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
