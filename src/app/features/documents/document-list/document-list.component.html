<h2 class="mb-4">Документы</h2>

<div class="d-flex justify-content-between align-items-center mb-4">
  <input type="text" 
         class="form-control w-50" 
         placeholder="Поиск по названию или номеру..." 
         [(ngModel)]="searchTerm"
         name="searchTerm"
         (keyup.enter)="search()">

  <a routerLink="/documents/new" class="btn btn-primary">
    <i class="bi bi-plus-lg"></i> Новый документ
  </a>
</div>

<div class="card">
  <div class="card-body p-0">
    <table class="table table-hover mb-0">
      <thead class="table-light">
        <tr>
          <th>Регистрационный №</th>
          <th>Название документа</th>
          <th>Автор</th>
          <th>Дата создания</th>
          <th>Статус</th>
          <th class="text-end">Действия</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let doc of documents">
          <td><strong class="text-primary">{{ doc.registrationNumber }}</strong></td>
          <td>
            <a [routerLink]="['/documents', doc.id]" 
              class="text-decoration-none fw-medium text-dark">
              {{ doc.title }}
            </a>
          </td>
          <td>{{ doc.authorName }}</td>
          <td>{{ doc.creationDate | date:'dd.MM.yyyy' }}</td>
          <td>
            <span *ngIf="doc.expiryDate" 
                  [class.text-danger]="doc.expiryDate < today">
              {{ doc.expiryDate | date:'dd.MM.yyyy' }}
            </span>
            <span *ngIf="!doc.expiryDate" class="text-muted">—</span>
          </td>
          <td>
            <span class="badge" [ngClass]="getStatusClass(doc.status)">
              {{ doc.status }}
            </span>
          </td>
          <td class="text-end">
            <button class="btn btn-sm btn-outline-success me-2" 
                    (click)="downloadDocument(doc.id, doc.fileName)">
              Скачать
            </button>
            <a [routerLink]="['/documents', doc.id]" 
              class="btn btn-sm btn-outline-primary">
              Просмотр
            </a>
          </td>
        </tr>

        <tr *ngIf="documents.length === 0">
          <td colspan="7" class="text-center py-5 text-muted">
            Документы не найдены
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
