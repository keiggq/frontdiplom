<h2 class="page-title">💬 Комментарии</h2>

<div class="card mb-4">
  <div class="card-body">
    <h5 class="mb-3">Добавить новый комментарий</h5>
    
    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label fw-semibold">Документ</label>
        <select class="form-select" 
                [(ngModel)]="selectedDocumentId" 
                required>
          <option value="" disabled selected>— Выберите документ —</option>
          <option *ngFor="let doc of documents" [value]="doc.id">
            {{ doc.title }} (№ {{ doc.registrationNumber }})
          </option>
        </select>
      </div>

      <div class="col-md-6 mb-3">
        <label class="form-label fw-semibold">Комментарий</label>
        <textarea class="form-control" rows="3" 
                  [(ngModel)]="newCommentContent"
                  placeholder="Введите текст комментария..."></textarea>
      </div>
    </div>

    <button class="btn btn-primary px-5" 
            (click)="addComment()"
            [disabled]="isSubmitting || !newCommentContent.trim() || !selectedDocumentId">
      <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm me-2"></span>
      Добавить комментарий
    </button>
  </div>
</div>

<h5 class="mb-3">Все комментарии</h5>

<div *ngFor="let comment of comments" class="card mb-3">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-start">
      <div class="d-flex align-items-center gap-3">
        <div class="bg-light rounded-circle d-flex align-items-center justify-content-center" 
             style="width: 40px; height: 40px;">
          <i class="bi bi-person-fill text-primary"></i>
        </div>
        <div>
          <strong>{{ comment.authorName }}</strong>
          <small class="text-muted d-block">
            {{ comment.authorPosition || 'Должность не указана' }}
          </small>
        </div>
      </div>
      <div class="d-flex align-items-center gap-2">
        <small class="text-muted">{{ comment.createdAt | date:'dd.MM.yyyy HH:mm' }}</small>
        
        <!-- Кнопка удаления только для своих комментариев -->
        <button *ngIf="comment.authorId === currentUserId" 
                class="btn btn-sm btn-outline-danger d-flex align-items-center gap-1"
                (click)="deleteComment(comment.id, comment.authorId)">
          <i class="bi bi-trash"></i>
          Удалить
        </button>
      </div>
    </div>
    <p class="mt-3 mb-1">{{ comment.content }}</p>
    <small class="text-muted">К документу: {{ comment.documentTitle }}</small>
  </div>
</div>
