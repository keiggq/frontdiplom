<div class="container-fluid mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="page-title">🛎️ Уведомления</h2>
    
    <div class="d-flex gap-3">
      <button class="btn btn-outline-secondary" 
              (click)="markAllAsRead()"
              [disabled]="notifications.length === 0">
        Отметить все как прочитанные
      </button>
      <button class="btn btn-outline-danger" 
              (click)="clearAll()"
              [disabled]="notifications.length === 0">
        Очистить все
      </button>
    </div>
  </div>

  <div class="card">
    <div class="card-body p-0">
      <!-- Пустое состояние -->
      <div *ngIf="notifications.length === 0" class="text-center py-5 text-muted">
        <i class="bi bi-bell fs-1 mb-4 text-secondary"></i>
        <h5>Нет уведомлений</h5>
        <p class="mb-0">Здесь будут появляться важные события по задачам и документам</p>
      </div>

      <!-- Список уведомлений -->
      <div class="list-group list-group-flush" *ngIf="notifications.length > 0">
        <div *ngFor="let notif of notifications" 
             class="list-group-item list-group-item-action p-4"
             [class.bg-light]="!notif.read">

          <div class="d-flex align-items-start gap-4">
            <!-- Иконка -->
            <span class="fs-3 mt-1" 
                  [class.text-success]="notif.type === 'success'"
                  [class.text-warning]="notif.type === 'warning'">
              <i class="bi" 
                 [class.bi-check-circle-fill]="notif.type === 'success'"
                 [class.bi-exclamation-triangle-fill]="notif.type === 'warning'"></i>
            </span>

            <!-- Основной контент -->
            <div class="flex-grow-1">
              <h6 class="mb-1 fw-semibold">{{ notif.title }}</h6>
              <p class="mb-2 text-muted">{{ notif.message }}</p>
              <small class="text-muted">{{ notif.date | date:'dd.MM.yyyy HH:mm' }}</small>

              <!-- Ссылка на документ, если есть в extraData -->
              <div *ngIf="notif.extraData?.documentId" class="mt-3">
                <a [routerLink]="['/documents', notif.extraData.documentId]" 
                   class="btn btn-sm btn-outline-primary">
                  <i class="bi bi-file-earmark-text"></i>
                  Открыть документ
                </a>
              </div>
            </div>

            <!-- Кнопка "Отметить как прочитанное" -->
            <button *ngIf="!notif.read" 
                    class="btn btn-sm btn-outline-primary px-3"
                    (click)="markAsRead(notif.id)">
              Прочитано
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
