<div class="container-fluid mt-4">
  <div class="d-flex justify-content-between align-items-center mb-5">
    <div>
      <h1 class="display-5 fw-bold mb-1">Добро пожаловать, {{ currentUserName }}!</h1>
      <p class="text-muted fs-5">Вот обзор вашей деятельности на сегодня</p>
    </div>
    <div class="text-end">
      <small class="text-muted d-block">Сегодня</small>
      <h5 class="mb-0 text-primary fw-semibold">{{ today | date:'dd MMMM yyyy' }}</h5>
    </div>
  </div>

  <!-- Карточки статистики -->
  <div class="row g-4 mb-5">
    <div class="col-xl-3 col-md-6">
      <div class="card stats-card h-100">
        <div class="card-body p-4">
          <div class="d-flex align-items-center justify-content-between">
            <div>
              <p class="text-muted mb-2">Всего документов</p>
              <h2 class="fw-bold mb-0 text-primary">{{ totalDocuments }}</h2>
            </div>
            <div class="stats-icon bg-primary bg-opacity-10">
              <i class="bi bi-file-earmark-text fs-1 text-primary"></i>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="col-xl-3 col-md-6">
      <div class="card stats-card h-100">
        <div class="card-body p-4">
          <div class="d-flex align-items-center justify-content-between">
            <div>
              <p class="text-muted mb-2">Активные задачи</p>
              <h2 class="fw-bold mb-0 text-amber-600">{{ activeTasks }}</h2>
            </div>
            <div class="stats-icon bg-amber-100">
              <i class="bi bi-list-task fs-1 text-amber-600"></i>
            </div>
          </div>
          <div class="mt-3">
            <span class="text-danger small fw-medium">
              Просрочено: {{ overdueTasksCount }}
            </span>
          </div>
        </div>
      </div>
    </div>

    

  <!-- Нижняя часть -->
  <div class="row g-4">
    <div class="col-lg-7">
      <div class="card h-100">
        <div class="card-header bg-white d-flex justify-content-between align-items-center">
          <h5 class="mb-0">Мои активные задачи</h5>
          <a routerLink="/tasks" class="btn btn-sm btn-outline-primary">Все задачи</a>
        </div>
        
      </div>
    </div>    
  </div>
</div>
